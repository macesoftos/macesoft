<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#713044" />
    <title>MaceSoft Offline</title>
    <style>
      @font-face {
        font-family: "Geist";
        src: url("/fonts/Geist-Variable.woff2") format("woff2");
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
      }
      :root {
        color: #1f1a1d;
        background: #f7f5f3;
        font-family: "Geist", Arial, sans-serif;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      body {
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
      }
      main {
        width: min(460px, 100%);
        border: 1px solid #e5dde0;
        border-radius: 10px;
        background: #fff;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        line-height: 1.2;
      }
      p {
        margin: 0;
        color: #696268;
        line-height: 1.55;
      }
      .offline-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 20px;
      }
      #connection-status {
        font-size: 14px;
      }
      button {
        min-height: 40px;
        border: 0;
        border-radius: 8px;
        background: #17664c;
        color: #fff;
        padding: 0 18px;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }
      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MaceSoft is offline</h1>
      <p>Reconnect to continue live clinic workflows. Previously loaded app assets may still open when the installed app cache is available.</p>
      <div class="offline-actions">
        <p id="connection-status" role="status">Waiting for a connection…</p>
        <button id="retry-connection" type="button">Retry</button>
      </div>
    </main>
    <script src="/offline-reconnect.js" defer></script>
  </body>
</html>
