<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#713044" />
    <title>MaceSoft Offline</title>
    <style>
      :root {
        color: #1f1a1d;
        background: #f7f5f3;
        font-family: Inter, Arial, sans-serif;
      }
      body {
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
      }
      main {
        width: min(460px, 100%);
        border: 1px solid #e5dde0;
        border-radius: 10px;
        background: #fff;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        line-height: 1.2;
      }
      p {
        margin: 0;
        color: #696268;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MaceSoft is offline</h1>
      <p>Reconnect to continue live clinic workflows. Previously loaded app assets may still open when the installed app cache is available.</p>
    </main>
  </body>
</html>
