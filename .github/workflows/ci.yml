name: production-readiness

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: macesoft
          POSTGRES_PASSWORD: macesoft_test
          POSTGRES_DB: macesoft_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U macesoft -d macesoft_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://macesoft:macesoft_test@127.0.0.1:5432/macesoft_test
      DIRECT_URL: postgresql://macesoft:macesoft_test@127.0.0.1:5432/macesoft_test
      FACETRACK_ENCRYPTION_KEY: ci-only-facetrack-key-32-characters
      APP_ORIGIN: http://127.0.0.1:5173
      SEED_STAFF_PASSWORD: Mace2026!
      ENABLE_DEMO_ACCOUNTS: "false"
      MARKETING_DRY_RUN: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma validate
      - name: Prepare Supabase-compatible database roles
        run: |
          psql "$DATABASE_URL" --set ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE anon NOLOGIN;
          CREATE ROLE authenticated NOLOGIN;
          SQL
      - run: pnpm exec prisma migrate deploy
      - run: pnpm db:seed
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:integration
      - run: pnpm build
      - run: pnpm audit --prod --audit-level high
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report
